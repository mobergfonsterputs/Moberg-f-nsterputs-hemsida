<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laddar bokning...</title>
    <style>
        :root {
            --tech-blue: #113768;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            overflow: hidden;
        }

        .booking-loader {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 4px solid rgba(17, 55, 104, 0.16);
            border-top-color: var(--tech-blue);
            animation: booking-spin 0.8s linear infinite;
        }

        @keyframes booking-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="booking-loader" aria-label="Laddar"></div>

    <script>
        (function () {
            var query = window.location.search || "";
            window.setTimeout(function () {
                window.location.replace("bokat.html" + query);
            }, 1800);
        })();
    </script>
</body>
</html>
